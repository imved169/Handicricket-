<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HandiCricket T5 | Multiplayer Cricket Game</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(145deg, #0a1f2e, #05131f);
      color: white;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      text-align: center;
      padding: 12px;
      margin: 0;
      min-height: 100vh;
    }

    /* Main container */
    .game-container {
      max-width: 650px;
      margin: 0 auto;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
    }

    /* Top team bar */
    .team-bar {
      display: flex;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.5);
      padding: 8px 12px;
      border-radius: 40px;
      margin-bottom: 12px;
      font-weight: bold;
      font-size: 0.85rem;
    }

    /* Main scorecard */
    .scorecard {
      background: #0c2b44;
      border-radius: 28px;
      padding: 12px 16px;
      margin-bottom: 12px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.3), 0 8px 12px rgba(0,0,0,0.2);
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .runs-wickets {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: 2px;
      color: #FFE484;
      text-shadow: 0 2px 5px #00000050;
    }

    .overs-rr {
      text-align: right;
      font-size: 0.9rem;
      color: #c0e0ff;
    }

    /* match bar */
    .match-info {
      display: flex;
      justify-content: space-between;
      background: #0a1a2a;
      padding: 8px 12px;
      border-radius: 60px;
      font-size: 0.75rem;
      margin: 10px 0;
    }

    /* over balls */
    .over-box {
      background: #071724;
      border-radius: 30px;
      padding: 8px;
      margin: 12px 0;
    }

    .balls-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .ball {
      width: 36px;
      height: 36px;
      background: #2c3e4e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.9rem;
      color: white;
      box-shadow: inset 0 -1px 0 rgba(0,0,0,0.2), 0 2px 5px black;
    }

    .ball.run { background: #2e7d32; }
    .ball.wicket { background: #c62828; }
    .ball.noball { background: #e67e22; }
    .ball.dot { background: #455a64; }
    .ball.empty { background: #1e2a36; opacity: 0.5; }

    /* Buttons grid */
    .buttons-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 20px 0;
    }
    .action-btn {
      background: radial-gradient(circle at 30% 10%, #1e88e5, #0d47a1);
      border: none;
      padding: 16px 0;
      font-size: 1.8rem;
      font-weight: bold;
      border-radius: 60px;
      color: white;
      box-shadow: 0 6px 0 #002c4b;
      transition: 0.05s linear;
      cursor: pointer;
    }
    .action-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #002c4b; }
    .action-btn:disabled { opacity: 0.5; transform: none; background: #4a627a; cursor: not-allowed; }
    .selected-card { background: #fbc02d !important; color: #1a2a3a !important; box-shadow: 0 0 0 2px white; }

    /* indicators */
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 30px;
      background: #ff9800;
      color: black;
      font-weight: bold;
      font-size: 0.7rem;
      margin: 4px;
    }
    .freehit { background: #4caf50; animation: pulse 1s infinite; }
    .powerplay { background: #ffeb3b; color: #1f1f1f; }

    /* comparison */
    .battle-card {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      background: #071e2c;
      border-radius: 28px;
      padding: 12px;
      margin: 12px 0;
    }
    .batter-stats, .bowler-stats {
      flex: 1;
      background: #0f2a3b;
      border-radius: 20px;
      padding: 8px;
    }
    .vs-div { background: #ffb74d; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin: auto; }

    /* waiting */
    .waiting-overlay {
      background: #000000aa;
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      backdrop-filter: blur(4px);
    }
    .waiting-card {
      background: #0a1f2e;
      padding: 24px;
      border-radius: 40px;
      text-align: center;
    }

    /* modal */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000000dd;
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: #112f44;
      width: 90%;
      max-width: 400px;
      border-radius: 40px;
      padding: 20px;
      color: white;
    }
    .player-option {
      background: #1f4a6e;
      margin: 8px 0;
      padding: 12px;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.1s;
    }
    .player-option.selected { background: #f9a825; color: black; font-weight: bold; }

    .hide { display: none; }
    @keyframes pulse { 0% { opacity: 0.7; } 100% { opacity: 1; transform: scale(1.02); } }
  </style>
</head>
<body>

<div class="game-container">
  <div class="team-bar">
    <span><i class="fas fa-batting-ball"></i> <span id="battingTeamName">Team A</span></span>
    <span><i class="fas fa-bowling-ball"></i> <span id="bowlingTeamName">Team B</span></span>
  </div>

  <div class="scorecard">
    <div class="score-row">
      <div class="runs-wickets"><span id="runs">0</span>/<span id="wickets">0</span></div>
      <div class="overs-rr">Overs: <span id="overs">0.0</span><br>RR: <span id="rr">0.00</span></div>
    </div>
    <div id="targetInfo" class="match-info" style="margin-top: 8px; background:#091e2c;">Target: --</div>
  </div>

  <div class="match-info">
    <span><i class="far fa-clock"></i> <span id="inningsLabel">1st Innings</span></span>
    <span id="roleDisplay">Selecting...</span>
    <span><i class="fas fa-chart-line"></i> <span id="powerplayIndicator" class="status-badge" style="background:#ffca28;">PP Over 1-2</span></span>
  </div>

  <!-- Over progress -->
  <div class="over-box">
    <div class="balls-row" id="ballsContainer"></div>
    <div style="font-size: 0.7rem; text-align:center; margin-top: 5px;">Current Over</div>
  </div>

  <!-- Batter vs Bowler -->
  <div class="battle-card">
    <div class="batter-stats"><i class="fas fa-user"></i> <strong id="batterName">-</strong><br><span id="batterRuns">0</span> (<span id="batterBalls">0</span>) SR: <span id="batterSR">0</span></div>
    <div class="vs-div">VS</div>
    <div class="bowler-stats"><i class="fas fa-bullseye"></i> <strong id="bowlerName">-</strong><br><span id="bowlerWkts">0</span> wkts, ER: <span id="bowlerER">0</span></div>
  </div>

  <div id="statusArea">
    <span id="freeHitIndicator" class="status-badge hide">Free Hit 🔥</span>
    <span id="waitingMsg" class="status-badge" style="background:#ff9800;">Waiting for opponent...</span>
  </div>

  <!-- Number buttons -->
  <div class="buttons-grid" id="cardButtons">
    <button class="action-btn" data-val="0">0</button>
    <button class="action-btn" data-val="1">1</button>
    <button class="action-btn" data-val="2">2</button>
    <button class="action-btn" data-val="3">3</button>
    <button class="action-btn" data-val="4">4</button>
    <button class="action-btn" data-val="5">5</button>
    <button class="action-btn" data-val="6">6</button>
  </div>

  <div style="display: flex; gap: 10px; margin-top: 10px;">
    <button id="resetPlaysBtn" style="flex:1; background:#4f5b62; border:none; padding: 10px; border-radius: 40px; color:white;">↺ Reset Selection</button>
    <button id="exitHomeBtn" style="flex:1; background:#c62828; border:none; padding: 10px; border-radius: 40px; color:white;">🏠 Go Home</button>
  </div>
</div>

<!-- MODAL: Batter/Bowler selection -->
<div id="selectionModal" class="modal hide">
  <div class="modal-content">
    <h3 id="modalTitle">Select Batter</h3>
    <div id="playersList"></div>
    <button id="confirmSelectBtn" style="margin-top: 15px; width:100%; padding: 12px; background:#1e88e5; border:none; border-radius: 60px;">Confirm</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, update, get, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

  // ---------- FIREBASE ----------
  const firebaseConfig = {
    apiKey: "AIzaSyD8kSmj_HRdxfKZhYUYq_H0A1r2C5VN5cA",
    authDomain: "handicricket-392da.firebaseapp.com",
    databaseURL: "https://handicricket-392da-default-rtdb.firebaseio.com",
    projectId: "handicricket-392da",
    storageBucket: "handicricket-392da.firebasestorage.app",
    messagingSenderId: "398034348468",
    appId: "1:398034348468:web:d1a61a4d5b586a4dd22ae1"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ---------- URL PARAMS ----------
  const urlParams = new URLSearchParams(window.location.search);
  const roomId = urlParams.get('room');
  const playerId = urlParams.get('player') || 'player1';
  if (!roomId) { alert("Missing room code"); window.location.href = "index.html"; }

  const opponentId = playerId === 'player1' ? 'player2' : 'player1';
  const isHost = playerId === 'player1';

  // ---------- GLOBAL STATE ----------
  let runs = 0, wickets = 0, balls = 0;
  let isPowerplayActive = true;
  let freeHit = false;
  let currentBatter = null, currentBowler = null;
  let batterStats = {}, bowlerStats = {};
  let teamPlayers = { player1: [], player2: [] };
  let teamName = { player1: "Team A", player2: "Team B" };
  let innings = 1;            // 1 or 2
  let target = 0;
  let firstInningsData = null;
  let matchActive = true;
  let gameEnded = false;
  let myTurnToSelect = false; // batting or bowling depending on innings/role
  let waitingForOpponent = false;
  let localSelectedValue = null;
  let processingLock = false;

  // DOM elements
  const runsSpan = document.getElementById('runs');
  const wktsSpan = document.getElementById('wickets');
  const oversSpan = document.getElementById('overs');
  const rrSpan = document.getElementById('rr');
  const targetInfoDiv = document.getElementById('targetInfo');
  const inningsLabel = document.getElementById('inningsLabel');
  const roleDisplay = document.getElementById('roleDisplay');
  const ballsContainer = document.getElementById('ballsContainer');
  const batterNameSpan = document.getElementById('batterName');
  const batterRunsSpan = document.getElementById('batterRuns');
  const batterBallsSpan = document.getElementById('batterBalls');
  const batterSR = document.getElementById('batterSR');
  const bowlerNameSpan = document.getElementById('bowlerName');
  const bowlerWktsSpan = document.getElementById('bowlerWkts');
  const bowlerER = document.getElementById('bowlerER');
  const freeHitIndicator = document.getElementById('freeHitIndicator');
  const waitingMsgSpan = document.getElementById('waitingMsg');
  const modal = document.getElementById('selectionModal');
  const modalTitle = document.getElementById('modalTitle');
  const playersListDiv = document.getElementById('playersList');
  const confirmBtn = document.getElementById('confirmSelectBtn');

  // references
  const matchStatsRef = ref(db, `rooms/${roomId}/matchStats`);
  const playsRef = ref(db, `rooms/${roomId}/currentPlays`);
  const firstInningsRef = ref(db, `rooms/${roomId}/firstInnings`);
  const firstInningsCompletedRef = ref(db, `rooms/${roomId}/firstInningsCompleted`);
  const secondInningsStartedRef = ref(db, `rooms/${roomId}/secondInningsStarted`);
  const teamsRef = ref(db, `rooms/${roomId}/teams`);
  const gameEndedRef = ref(db, `rooms/${roomId}/gameEnded`);
  const matchResultRef = ref(db, `rooms/${roomId}/matchResult`);

  // Helper: update UI from matchStats
  function refreshUIFromState(state) {
    if (!state) return;
    runs = state.runs || 0;
    wickets = state.wickets || 0;
    balls = state.balls || 0;
    batterStats = state.batterStats || {};
    bowlerStats = state.bowlerStats || {};
    currentBatter = state.currentBatter;
    currentBowler = state.currentBowler;
    freeHit = state.freeHit || false;
    isPowerplayActive = (Math.floor(balls/6) < 2);
    
    updateScoreUI();
    updateOverDisplay();
    updateBowlerBatterUI();
    freeHitIndicator.classList.toggle('hide', !freeHit);
    document.getElementById('powerplayIndicator').innerText = isPowerplayActive ? "Powerplay (1-2)" : "PP Ended";
    if(innings === 2 && target) {
      let needed = target - runs;
      let ballsLeft = (5*6) - balls;
      targetInfoDiv.innerHTML = `🎯 Target: ${target} | Need: ${needed} runs in ${Math.floor(ballsLeft/6)}.${ballsLeft%6} overs`;
    } else targetInfoDiv.innerHTML = `🏏 T5 Match`;
  }

  function updateScoreUI() {
    runsSpan.innerText = runs;
    wktsSpan.innerText = wickets;
    let overVal = Math.floor(balls/6) + (balls%6)/10;
    oversSpan.innerText = overVal.toFixed(1);
    let rrVal = (balls/6) > 0 ? (runs / (balls/6)).toFixed(2) : "0.00";
    rrSpan.innerText = rrVal;
  }

  function updateOverDisplay() {
    ballsContainer.innerHTML = '';
    let ballsInOver = balls % 6;
    for(let i=0;i<6;i++) {
      let ballDiv = document.createElement('div');
      ballDiv.className = 'ball empty';
      if(i < ballsInOver) ballDiv.className = 'ball dot';
      if(i < ballsInOver) ballDiv.innerText = '•';
      else ballDiv.innerText = '';
      ballsContainer.appendChild(ballDiv);
    }
  }

  function updateBowlerBatterUI() {
    if(currentBatter && batterStats[currentBatter]) {
      let b = batterStats[currentBatter];
      batterNameSpan.innerText = currentBatter;
      batterRunsSpan.innerText = b.runs || 0;
      batterBallsSpan.innerText = b.balls || 0;
      let sr = b.balls ? ((b.runs/b.balls)*100).toFixed(1) : "0";
      batterSR.innerText = sr;
    } else { batterNameSpan.innerText = "-"; batterRunsSpan.innerText = "0"; batterBallsSpan.innerText = "0"; batterSR.innerText = "0";}
    if(currentBowler && bowlerStats[currentBowler]) {
      let bowl = bowlerStats[currentBowler];
      bowlerNameSpan.innerText = currentBowler;
      bowlerWktsSpan.innerText = (bowl.wickets || 0).toFixed(1);
      let oversB = (bowl.balls || 0)/6;
      let er = oversB ? (bowl.runs / oversB).toFixed(2) : "0.00";
      bowlerER.innerText = er;
    } else { bowlerNameSpan.innerText = "-"; bowlerWktsSpan.innerText = "0"; bowlerER.innerText = "0";}
  }

  // ---------- GAME LOGIC (only host executes) ----------
  async function processBallOutcome(val1, val2) {
    if(!isHost) return;
    if(gameEnded) return;
    let runsScored = 0;
    let wicketEvent = false;
    let isNoBall = false;
    let newFreeHit = false;
    let outcomeMsg = "";

    // FREE HIT HANDLING
    if(freeHit) {
      runsScored = val1;  // batter score freehit cannot get out
      outcomeMsg = `${runsScored} runs (Free Hit)`;
      newFreeHit = false;
    } 
    else if(val1 === val2 && val1 !== 0) {  // match
      wicketEvent = true;
      outcomeMsg = "WICKET!";
    }
    else if(val1 === 0 && val2 === 0) {
      isNoBall = true;
      runsScored = 1;
      newFreeHit = true;
      outcomeMsg = "NO BALL! +1, Free Hit next";
    }
    else {
      runsScored = val1;
      outcomeMsg = `${runsScored} runs`;
    }

    // update runs & wickets
    if(isNoBall) runs += runsScored;
    else {
      runs += runsScored;
      if(wicketEvent) wickets++;
    }

    // update batter stats
    if(currentBatter) {
      if(!batterStats[currentBatter]) batterStats[currentBatter] = { runs:0, balls:0, fours:0, sixes:0 };
      if(!isNoBall && !wicketEvent) {
        batterStats[currentBatter].balls += 1;
        batterStats[currentBatter].runs += runsScored;
        if(runsScored === 4) batterStats[currentBatter].fours++;
        if(runsScored === 6) batterStats[currentBatter].sixes++;
      } else if(isNoBall) {
        batterStats[currentBatter].runs += runsScored;  // runs off no-ball count but no ball
      }
    }
    // update bowler stats
    if(currentBowler) {
      if(!bowlerStats[currentBowler]) bowlerStats[currentBowler] = { wickets:0, runs:0, balls:0, noballs:0 };
      if(!isNoBall) {
        bowlerStats[currentBowler].balls += 1;
        bowlerStats[currentBowler].runs += runsScored;
        if(wicketEvent) bowlerStats[currentBowler].wickets += 1;
      } else {
        bowlerStats[currentBowler].noballs += 1;
        bowlerStats[currentBowler].runs += 1; // no ball extra run
      }
    }

    // increment balls only for legal deliveries
    if(!isNoBall) balls++;
    freeHit = newFreeHit;

    // Innings end conditions
    if(innings === 1 && (wickets >= 10 || balls >= 30)) {
      // first innings done
      await finishFirstInnings();
      return;
    }

    if(innings === 2) {
      let chaseSuccess = runs >= target;
      let allOut = wickets >= 10;
      let oversFinished = balls >= 30;
      if(chaseSuccess || allOut || oversFinished) {
        await finishMatch(chaseSuccess);
        return;
      }
    }

    // if wicket, need new batter selection for opponent
    if(wicketEvent && innings===1) {
      // need new batter for batting team
      await update(matchStatsRef, { runs, wickets, balls, batterStats, bowlerStats, currentBatter, currentBowler, freeHit });
      // request batting team to choose batter (only player side)
      if(playerId === (innings===1 ? (firstInningsData?.battingFirst || "player1") : "player2")) {
        openBatterSelection(true);
      }
    } else {
      // save state after ball
      await update(matchStatsRef, { runs, wickets, balls, batterStats, bowlerStats, currentBatter, currentBowler, freeHit });
    }
    // after host processes, clear plays
    await set(playsRef, {});
    if(gameEnded) return;
    // if over finished, may need new bowler selection after over end (optional select new bowler)
    if(balls % 6 === 0 && !gameEnded && innings===1 && !wicketEvent) {
      // request bowler team select new bowler
      if(playerId === (innings===1 ? (firstInningsData?.bowlingFirst || "player2") : "player1")) {
        openBowlerSelection(true);
      }
    }
  }

  async function finishFirstInnings() {
    firstInningsData = { runs, wickets, balls, batterStats, bowlerStats, battingFirst: firstInningsData?.battingFirst || "player1" };
    await set(firstInningsRef, firstInningsData);
    await set(firstInningsCompletedRef, true);
    await set(matchStatsRef, null);
    innings = 2;
    target = runs + 1;
    runs = 0; wickets = 0; balls = 0; freeHit = false;
    batterStats = {}; bowlerStats = {};
    currentBatter = null; currentBowler = null;
    await update(matchStatsRef, { runs:0, wickets:0, balls:0, batterStats, bowlerStats, currentBatter:null, currentBowler:null, freeHit:false });
    await set(playsRef, {});
    inningsLabel.innerText = "2nd Innings";
    targetInfoDiv.innerHTML = `🎯 Target: ${target} | Need: ${target} runs`;
    // set batting team for second innings = chasing team (opposite of who batted first)
    let chasingTeam = firstInningsData.battingFirst === "player1" ? "player2" : "player1";
    if(playerId === chasingTeam) openBatterSelection(true);
    else { roleDisplay.innerText = `Bowling`; myTurnToSelect = false; waitingForOpponent = true; }
    updateScoreUI();
  }

  async function finishMatch(chased) {
    if(gameEnded) return;
    gameEnded = true;
    matchActive = false;
    let winner = null;
    let margin = "";
    if(chased) {
      winner = (innings===2 ? (firstInningsData.battingFirst==="player1"?"player2":"player1") : null);
      margin = `${10 - wickets} wickets`;
    } else {
      winner = (innings===2 ? firstInningsData.battingFirst : null);
      margin = `${target - runs - 1} runs`;
    }
    let resultText = `${winner === "player1" ? teamName.player1 : teamName.player2} won by ${margin}`;
    await set(gameEndedRef, true);
    await set(matchResultRef, { winner, margin, target, finalRuns: runs, finalWkts: wickets });
    document.getElementById('waitingMsg').innerText = `🏆 ${resultText}`;
    document.querySelectorAll('.action-btn').forEach(btn => btn.disabled = true);
    showResultModal(resultText);
    await storeMatchHistory(winner, margin);
  }

  async function storeMatchHistory(winner, margin) {
    try {
      const matchId = `${roomId}_${Date.now()}`;
      const matchRecord = {
        roomId, winner, margin, target, firstInnings: firstInningsData, secondInningsStats: { runs, wickets, balls, batterStats, bowlerStats },
        timestamp: serverTimestamp(),
        playersData: {}
      };
      const allPlayers = [...teamPlayers.player1, ...teamPlayers.player2];
      for(let p of allPlayers) {
        let bat = batterStats[p] || { runs:0, balls:0 };
        let bowl = bowlerStats[p] || { wickets:0, runs:0, balls:0 };
        matchRecord.playersData[p] = { runsScored: bat.runs, ballsFaced: bat.balls, wickets: bowl.wickets, runsGiven: bowl.runs, oversBowled: (bowl.balls/6).toFixed(1) };
        // update global player stats
        const playerRefStat = ref(db, `playerStats/${p.replace(/[.#$/]/g,'_')}`);
        const snap = await get(playerRefStat);
        let existing = snap.val() || { totalRuns:0, totalBalls:0, totalWickets:0, totalRunsGiven:0, matchesPlayed:0, highestScore:0, bestBowling:0 };
        let newRuns = existing.totalRuns + (bat.runs||0);
        let newBalls = existing.totalBalls + (bat.balls||0);
        let newWkts = existing.totalWickets + (bowl.wickets||0);
        let newRunsGiven = existing.totalRunsGiven + (bowl.runs||0);
        let highScore = Math.max(existing.highestScore || 0, bat.runs||0);
        let bestBowling = Math.max(existing.bestBowling || 0, bowl.wickets||0);
        await set(playerRefStat, { totalRuns: newRuns, totalBalls: newBalls, totalWickets: newWkts, totalRunsGiven: newRunsGiven, matchesPlayed: (existing.matchesPlayed||0)+1, highestScore: highScore, bestBowling: bestBowling });
      }
      await set(ref(db, `matches/${matchId}`), matchRecord);
    } catch(e) { console.warn(e); }
  }

  function showResultModal(msg) {
    let modalDiv = document.createElement('div');
    modalDiv.className = 'modal';
    modalDiv.innerHTML = `<div class="modal-content"><h2>Match Ended</h2><p>${msg}</p><button id="closeResultBtn" style="background:#f9a825; padding:12px; border-radius:40px;">Go Home</button></div>`;
    document.body.appendChild(modalDiv);
    document.getElementById('closeResultBtn').onclick = ()=> window.location.href = "index.html";
  }

  // ---------- UI CONTROLS ----------
  function disableButtons(disabled=true) { document.querySelectorAll('.action-btn').forEach(btn => btn.disabled = disabled); }
  function setGameTurn() {
    let battingTeam = (innings===1) ? (firstInningsData?.battingFirst || "player1") : (firstInningsData?.battingFirst === "player1" ? "player2" : "player1");
    myTurnToSelect = (playerId === battingTeam);
    roleDisplay.innerText = myTurnToSelect ? "🔴 Your turn: Batting" : "⚡ Bowling: Waiting";
    if(!myTurnToSelect) waitingForOpponent = true;
    else waitingForOpponent = false;
    if(gameEnded) disableButtons(true);
    else disableButtons(!myTurnToSelect || waitingForOpponent);
  }

  async function openBatterSelection(force=false) {
    if(!force && !myTurnToSelect) return;
    let battingTeam = (innings===1) ? (firstInningsData?.battingFirst || "player1") : (firstInningsData?.battingFirst === "player1" ? "player2" : "player1");
    let available = teamPlayers[battingTeam].filter(p => {
      let w = (batterStats[p]?.wicketsDummy || 0);
      return w < 1;
    });
    if(available.length===0) return;
    modalTitle.innerText = "Select Batter";
    playersListDiv.innerHTML = '';
    available.forEach(p => {
      let div = document.createElement('div');
      div.className = 'player-option';
      div.innerText = p;
      div.onclick = () => { document.querySelectorAll('.player-option').forEach(el=>el.classList.remove('selected')); div.classList.add('selected'); };
      playersListDiv.appendChild(div);
    });
    modal.classList.remove('hide');
    const confirmHandler = async () => {
      let selectedDiv = document.querySelector('.player-option.selected');
      if(!selectedDiv) return;
      let selected = selectedDiv.innerText;
      currentBatter = selected;
      await update(matchStatsRef, { currentBatter: selected });
      modal.classList.add('hide');
      confirmBtn.removeEventListener('click', confirmHandler);
      setGameTurn();
    };
    confirmBtn.removeEventListener('click', confirmHandler);
    confirmBtn.addEventListener('click', confirmHandler);
  }

  async function openBowlerSelection(force=false) {
    if(!force && myTurnToSelect) return;
    let bowlingTeam = (innings===1) ? (firstInningsData?.battingFirst === "player1" ? "player2" : "player1") : firstInningsData?.battingFirst;
    let available = teamPlayers[bowlingTeam];
    if(!available.length) return;
    modalTitle.innerText = "Select Bowler";
    playersListDiv.innerHTML = '';
    available.forEach(p => {
      let div = document.createElement('div');
      div.className = 'player-option';
      div.innerText = p;
      div.onclick = () => { document.querySelectorAll('.player-option').forEach(el=>el.classList.remove('selected')); div.classList.add('selected'); };
      playersListDiv.appendChild(div);
    });
    modal.classList.remove('hide');
    const confirmBowler = async () => {
      let selectedDiv = document.querySelector('.player-option.selected');
      if(!selectedDiv) return;
      currentBowler = selectedDiv.innerText;
      await update(matchStatsRef, { currentBowler });
      modal.classList.add('hide');
      confirmBtn.removeEventListener('click', confirmBowler);
      setGameTurn();
    };
    confirmBtn.removeEventListener('click', confirmBowler);
    confirmBtn.addEventListener('click', confirmBowler);
  }

  // ---------- CARD CLICKS (send selection) ----------
  function setupCardButtons() {
    const btns = document.querySelectorAll('.action-btn');
    btns.forEach(btn => {
      btn.addEventListener('click', async () => {
        if(gameEnded) return;
        if(!myTurnToSelect || waitingForOpponent || processingLock) return;
        let val = parseInt(btn.dataset.val);
        localSelectedValue = val;
        processingLock = true;
        disableButtons(true);
        waitingMsgSpan.innerText = "⏳ Waiting for opponent ...";
        await update(playsRef, { [playerId]: val });
        let checkPlays = setInterval(async () => {
          const snap = await get(playsRef);
          if(snap.exists()) {
            let p1 = snap.val().player1;
            let p2 = snap.val().player2;
            if(p1 !== undefined && p2 !== undefined && isHost) {
              clearInterval(checkPlays);
              await processBallOutcome(p1, p2);
              await set(playsRef, {});
              processingLock = false;
              waitingMsgSpan.innerText = "Waiting for opponent...";
              setGameTurn();
              disableButtons(false);
            } else if(p1 !== undefined && p2 !== undefined && !isHost) {
              clearInterval(checkPlays);
              processingLock = false;
              waitingMsgSpan.innerText = "Opponent processed";
              setGameTurn();
              disableButtons(false);
            }
          }
        }, 800);
      });
    });
  }

  // ---------- FIREBASE SYNC ----------
  function initListeners() {
    onValue(matchStatsRef, (snap) => {
      if(snap.exists()) refreshUIFromState(snap.val());
    });
    onValue(teamsRef, async (snap) => {
      if(snap.exists()) {
        let t = snap.val();
        if(t.player1) { teamPlayers.player1 = t.player1.players || []; teamName.player1 = t.player1.name; }
        if(t.player2) { teamPlayers.player2 = t.player2.players || []; teamName.player2 = t.player2.name; }
        document.getElementById('battingTeamName').innerText = (innings===1?teamName.player1:teamName.player2);
        document.getElementById('bowlingTeamName').innerText = (innings===1?teamName.player2:teamName.player1);
      }
    });
    onValue(firstInningsCompletedRef, (snap) => {
      if(snap.val() && !firstInningsData) get(firstInningsRef).then(s => { firstInningsData = s.val(); innings=2; target = firstInningsData.runs+1; inningsLabel.innerText="2nd Innings"; setGameTurn(); });
    });
    onValue(gameEndedRef, (snap) => { if(snap.val()) gameEnded=true; });
    onValue(playsRef, (snap) => {
      if(!isHost && snap.exists() && snap.val()[playerId] !== undefined && snap.val()[opponentId] !== undefined) waitingMsgSpan.innerText = "Processing...";
    });
  }

  async function loadInitialState() {
    const teamsSnap = await get(teamsRef);
    if(teamsSnap.exists()) {
      let t = teamsSnap.val();
      if(t.player1) teamPlayers.player1 = t.player1.players || [];
      if(t.player2) teamPlayers.player2 = t.player2.players || [];
      teamName.player1 = t.player1?.name || "Team A";
      teamName.player2 = t.player2?.name || "Team B";
    }
    const firstComp = await get(firstInningsCompletedRef);
    if(firstComp.val()) {
      const firstData = await get(firstInningsRef);
      if(firstData.exists()) {
        firstInningsData = firstData.val();
        innings = 2;
        target = firstInningsData.runs + 1;
      }
    }
    const stats = await get(matchStatsRef);
    if(stats.exists()) refreshUIFromState(stats.val());
    setGameTurn();
    if(innings === 1 && (!currentBatter || !currentBowler)) {
      if(playerId === "player1") { openBatterSelection(true); openBowlerSelection(false); } 
      else { if(currentBatter) openBowlerSelection(true); else openBatterSelection(true); }
    }
  }

  document.getElementById('resetPlaysBtn').onclick = async () => { await set(playsRef, {}); localSelectedValue=null; disableButtons(false); waitingMsgSpan.innerText = "Waiting for opponent..."; };
  document.getElementById('exitHomeBtn').onclick = () => window.location.href = "index.html";

  (async () => {
    await loadInitialState();
    setupCardButtons();
    initListeners();
    if(isHost && (!currentBowler || !currentBatter) && innings===1) { openBatterSelection(true); }
  })();
</script>
</body>
</html>
